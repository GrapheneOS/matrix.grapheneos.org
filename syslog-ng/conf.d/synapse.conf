source s_synapse_background {
    unix-dgram("/run/syslog/synapse-background" group("synapse") perm(0660));
};
source s_synapse_client_reader {
    unix-dgram("/run/syslog/synapse-client_reader" group("synapse") perm(0660));
};
source s_synapse_events_writer {
    unix-dgram("/run/syslog/synapse-events_writer" group("synapse") perm(0660));
};
source s_synapse_federation_reader {
    unix-dgram("/run/syslog/synapse-federation_reader" group("synapse") perm(0660));
};
source s_synapse_federation_sender1 {
    unix-dgram("/run/syslog/synapse-federation_sender1" group("synapse") perm(0660));
};
source s_synapse_federation_sender2 {
    unix-dgram("/run/syslog/synapse-federation_sender2" group("synapse") perm(0660));
};
